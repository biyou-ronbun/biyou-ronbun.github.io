name: サイトを公開する

# main ブランチに push されたら自動で走る。
# 手動で走らせたいときは、GitHub の Actions タブから「Run workflow」でも実行できる。
on:
  push:
    branches: [main]
  workflow_dispatch:
  # 毎日ビルドし直す。
  # 公開日を先の日付にしてある記事（＝メンバーへの先出し）を、
  # 公開日が来たら push が無くても全員に出すため。
  schedule:
    - cron: '0 21 * * *' # UTC 21:00 = 日本時間 6:00

permissions:
  contents: read
  pages: write
  id-token: write

# 公開の途中でもう一度 push されても、混ざらないようにする
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取ってくる
        uses: actions/checkout@v4

      - name: Node を用意する
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ここが関門。1本でも捏造・薬機法違反があれば、ここで公開が止まる。
      # 記事を人間が読まずに公開する以上、機械が代わりに保証する。
      - name: 論文の実在とタイトルを PubMed で検証する
        run: node site/verify.mjs

      # MEMBER_TOKEN はメンバーのページのURL（＝鍵）。公開リポジトリには置けないので
      # GitHub の Secrets から渡す。空なら、メンバーのページは作られないだけ。
      - name: サイトをビルドする
        run: node site/build.mjs
        env:
          MEMBER_TOKEN: ${{ secrets.MEMBER_TOKEN }}

      # Pages の有効化そのものは site/setup-github.mjs が最初の1回だけ行う。
      # ここで enablement: true を使うと、Actions のトークンには
      # Pages を新規作成する権限が無いため失敗する。
      - name: GitHub Pages の設定を読む
        uses: actions/configure-pages@v5

      - name: できあがったサイトを渡す
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 公開する
        id: deployment
        uses: actions/deploy-pages@v4
