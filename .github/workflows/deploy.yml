name: サイトを公開する

# main ブランチに push されたら自動で走る。
# 手動で走らせたいときは、GitHub の Actions タブから「Run workflow」でも実行できる。
on:
  push:
    branches: [main]
  workflow_dispatch:
  # 毎日ビルドし直す。
  # 公開日を先の日付にしてある記事（＝メンバーへの先出し）を、
  # 公開日が来たら push が無くても全員に出すため。
  schedule:
    - cron: '0 21 * * *' # UTC 21:00 = 日本時間 6:00

permissions:
  contents: read
  pages: write
  id-token: write

# 公開の途中でもう一度 push されても、混ざらないようにする
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取ってくる
        uses: actions/checkout@v4

      - name: Node を用意する
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ここが関門。1本でも捏造・薬機法違反があれば、ここで公開が止まる。
      # 記事を人間が読まずに公開する以上、機械が代わりに保証する。
      - name: 論文の実在とタイトルを PubMed で検証する
        run: node site/verify.mjs

      # 公開リポジトリに置けないものを、ここから渡す。
      #   MEMBER_TOKEN        … メンバーのページのURL（＝鍵）
      #   MEMBER_LEGAL_NAME   … 特定商取引法の表示（本名）
      #   MEMBER_CONTACT_EMAIL … 同上（連絡先）
      # どれも、Stripe の支払いリンクが config.json に入るまでサイトには出ない。
      - name: サイトをビルドする
        run: node site/build.mjs
        env:
          MEMBER_TOKEN: ${{ secrets.MEMBER_TOKEN }}
          MEMBER_LEGAL_NAME: ${{ secrets.MEMBER_LEGAL_NAME }}
          MEMBER_CONTACT_EMAIL: ${{ secrets.MEMBER_CONTACT_EMAIL }}

      # Pages の有効化そのものは site/setup-github.mjs が最初の1回だけ行う。
      # ここで enablement: true を使うと、Actions のトークンには
      # Pages を新規作成する権限が無いため失敗する。
      - name: GitHub Pages の設定を読む
        uses: actions/configure-pages@v5

      - name: できあがったサイトを渡す
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 公開する
        id: deployment
        uses: actions/deploy-pages@v4

  # 公開が終わってから、検索エンジンに「更新しました」と伝える。
  # ★ Google は IndexNow に対応していません（Bing・Yandex のみ）。
  #   これで劇的に人が増えることはありません。無料で、失敗しても何も壊れないから入れているだけです。
  notify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: サイトを組み直す（sitemap を得るため）
        run: node site/build.mjs
      - name: IndexNow に伝える
        run: node site/indexnow.mjs
        continue-on-error: true
