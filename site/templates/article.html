<article class="post">
  <header class="post-header">
    <div class="card-meta">
      <span class="chip">{{CATEGORY}}</span>
      <time datetime="{{DATE}}">{{DATE_LABEL}}</time>
    </div>
    <h1 class="post-title">{{TITLE}}</h1>
    <p class="post-subtitle">{{SUBTITLE}}</p>
  </header>

  <div class="post-body">
{{BODY}}
  </div>

{{CTA}}

  <footer class="post-footer">
    <p class="post-note">この記事は、末尾の参考文献に挙げた論文だけを根拠に書いています。論文に書かれていないことは書いていません。確認できなかったことは「確認できなかった」と書いています。<br>このブログは広告・アフィリエイトを一切掲載していません。<a href="{{ROOT}}policy.html">お金の取り方について</a></p>
    <a class="back-link" href="{{ROOT}}index.html">記事一覧へ戻る</a>
  </footer>
</article>
