  <p class="hero-lead">「なんとなく良さそう」で選ぶのを、やめるためのブログです。</p>
  <p class="hero-body">レチノール、コラーゲン、日焼け止め。よく聞く美容の話を、雑誌やSNSではなく<strong>学術論文まで辿って</strong>確かめます。数字はそのまま出します。そして、<strong>「ここまでは言えません」も正直に書きます。</strong></p>
</section>

{{TAGS}}

<div class="finder">
  <label class="finder-search">
    <span class="sr-only">記事を検索</span>
    <input type="search" id="q" placeholder="成分名や気になる言葉で探す（例: レチノール、資金、動物実験）" autocomplete="off">
  </label>
  <div class="finder-cats" id="cats"></div>
  <p class="finder-count" id="count"></p>
</div>

<h2 class="section-heading">記事</h2>

<ul class="article-list" id="list">
{{ARTICLE_LIST}}
</ul>

<p class="finder-empty" id="empty" hidden>見つかりませんでした。<br>「見つからない」と書くのがこのブログの流儀なので、ここでも正直に書きます。</p>

<p class="list-more" id="more" hidden><button type="button" id="more-btn" class="list-more-btn">記事をすべて見る<span id="more-n"></span></button></p>

<script>
// サーバーが無いので、検索は読者のブラウザの中で行う。
// 記事が増えても、build が search.json を作り直すので、ここは触らなくていい。
(function () {
  var input = document.getElementById('q');
  var list = document.getElementById('list');
  var cats = document.getElementById('cats');
  var count = document.getElementById('count');
  var empty = document.getElementById('empty');
  if (!input || !list) return;

  var cards = Array.prototype.slice.call(list.querySelectorAll('.card'));
  var data = [];
  var activeCat = null;

  fetch('search.json')
    .then(function (r) { return r.json(); })
    .then(function (json) {
      data = json;
      var names = [];
      json.forEach(function (a) {
        if (names.indexOf(a.category) < 0) names.push(a.category);
      });
      names.forEach(function (name) {
        var b = document.createElement('button');
        b.type = 'button';
        b.className = 'finder-cat';
        b.textContent = name;
        b.addEventListener('click', function () {
          activeCat = activeCat === name ? null : name;
          Array.prototype.forEach.call(cats.children, function (c) {
            c.classList.toggle('is-on', c.textContent === activeCat);
          });
          apply();
        });
        cats.appendChild(b);
      });
    })
    .catch(function () { /* 検索データが読めなくても、記事一覧はそのまま出る */ });

  function haystack(slug) {
    var a = data.filter(function (x) { return x.slug === slug; })[0];
    if (!a) return '';
    return [a.title, a.subtitle, a.summary, a.category].join(' ').toLowerCase();
  }

  // ★ 最初は数本だけ出す。検索と絞り込みがあるので、全部並べる必要はない。
  //
  //   ★★ ただし、**カードは全部 HTML に出したまま隠す。**
  //     消してしまうと:
  //       ・**検索に引っかからなくなる**（検索はこのカードを show/hide しているだけ）
  //       ・**Google に見えなくなる**（記事へのリンクが1本も無いページになる）
  //
  //   ★ そして、**検索・絞り込みの最中は、上限を外す。**
  //     絞り込んだ結果が「もっと見る」の下に隠れていたら、探す機能が壊れます。
  var LIMIT = 6;
  var showAll = false;
  var more = document.getElementById('more');
  var moreBtn = document.getElementById('more-btn');
  var moreN = document.getElementById('more-n');

  if (moreBtn) {
    moreBtn.addEventListener('click', function () {
      showAll = true;
      more.hidden = true;
      apply();
    });
  }

  function apply() {
    var q = input.value.trim().toLowerCase();
    var filtering = Boolean(q || activeCat);
    var matched = 0;
    var shown = 0;

    cards.forEach(function (card) {
      var link = card.querySelector('.card-link');
      var slug = link ? link.getAttribute('href').split('/').pop().replace('.html', '') : '';
      var rec = data.filter(function (x) { return x.slug === slug; })[0];

      var okCat = !activeCat || (rec && rec.category === activeCat);
      var okQ = !q || haystack(slug).indexOf(q) >= 0;
      var ok = okCat && okQ;

      if (ok) matched++;

      // ★ 検索・絞り込み中は、上限を外す（探した結果が隠れたら、探す機能が壊れる）
      var withinLimit = filtering || showAll || matched <= LIMIT;
      var show = ok && withinLimit;

      card.hidden = !show;
      if (show) shown++;
    });

    empty.hidden = matched > 0;
    count.textContent = filtering ? matched + ' 本' : '';

    // 「もっと見る」は、絞り込んでいないときで、まだ隠れているカードがあるときだけ
    if (more) {
      var hiddenCount = matched - shown;
      more.hidden = filtering || showAll || hiddenCount <= 0;
      if (moreN) moreN.textContent = hiddenCount > 0 ? '（あと ' + hiddenCount + ' 本）' : '';
    }
  }

  input.addEventListener('input', apply);
  apply();
})();
</script>
