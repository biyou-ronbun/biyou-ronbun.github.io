  <li class="card">
    <a class="card-link" href="{{ROOT}}articles/{{SLUG}}.html">
      <div class="card-meta">
        <span class="chip">{{CATEGORY}}</span>{{PR_CHIP}}
        <time datetime="{{DATE}}">{{DATE_LABEL}}</time>
      </div>
      {{SERIES_LABEL}}
      <h3 class="card-title">{{TITLE}}</h3>
      <p class="card-answer">{{ANSWER}}</p>
{{FIGURE}}
      <p class="card-summary">{{SUMMARY}}</p>
      <div class="card-facts">{{FACTS}}</div>
      <span class="card-more">読む</span>
    </a>
  </li>
